<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Withdraw — SecureBank</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-primary px-4">
    <a href="/dashboard" class="navbar-brand fw-bold fs-5 text-decoration-none">
      &#127974; SecureBank
    </a>
    <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
  </nav>

  <div class="container py-5 d-flex justify-content-center">
    <div class="card shadow-sm" style="width: 100%; max-width: 480px;">
      <div class="card-body p-4 p-md-5">

        <h3 class="fw-bold mb-1 text-warning">&#8681; Withdraw Funds</h3>
        <p class="text-muted mb-3">Enter the amount you wish to withdraw from your account.</p>

        <!-- Available balance hint -->
        {% if balance is defined %}
        <div class="alert alert-light border mb-4 py-2 px-3 d-flex justify-content-between align-items-center">
          <span class="text-muted small fw-semibold">Available Balance</span>
          <span class="fw-bold text-primary">${{ "%.2f"|format(balance) }}</span>
        </div>
        {% endif %}

        <!-- Error alert -->
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
          <small>{{ error }}</small>
          <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <!-- Withdraw form -->
        <form action="/withdraw" method="POST" novalidate>
          <div class="mb-4">
            <label for="amount" class="form-label fw-semibold">Amount ($)</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input
                type="number"
                id="amount"
                name="amount"
                class="form-control form-control-lg"
                placeholder="0.00"
                step="0.01"
                min="0.01"
                required
                autofocus
              />
            </div>
            <div class="form-text">Cannot exceed your available balance.</div>
          </div>

          <button type="submit" class="btn btn-warning w-100 py-2 fw-semibold text-dark mb-3">
            Confirm Withdrawal
          </button>
        </form>

        <a href="/dashboard" class="btn btn-outline-secondary w-100 py-2">
          &larr; Back to Dashboard
        </a>

      </div>
    </div>
  </div>

</body>
</html>
