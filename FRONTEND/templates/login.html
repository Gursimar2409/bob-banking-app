<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SecureBank</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4 p-md-5">

      <!-- Bank branding -->
      <div class="text-center mb-4">
        <div class="bank-logo mx-auto mb-3">
          <span class="bank-logo-icon">&#127974;</span>
        </div>
        <h1 class="h3 fw-bold text-primary mb-1">SecureBank</h1>
        <p class="text-muted small">Online Banking Portal</p>
      </div>

      <!-- Error alert -->
      {% if error %}
      <div class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <small>{{ error }}</small>
        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <!-- Login form -->
      <form action="/login" method="POST" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label fw-semibold">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            placeholder="Enter your username"
            required
            autofocus
          />
        </div>

        <div class="mb-4">
          <label for="password" class="form-label fw-semibold">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="Enter your password"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          Sign In
        </button>
      </form>

      <hr class="my-4" />
      <p class="text-center text-muted small mb-0">
        <strong>Demo accounts:</strong>&nbsp; alice / bob / charlie &mdash; password: <code>password123</code>
      </p>
    </div>
  </div>

</body>
</html>
